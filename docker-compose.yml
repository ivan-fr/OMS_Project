services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-oms-app
    ports:
      - '3001:3000'
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    command: sh -c "npx prisma generate ; npm run start:dev"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-mongodb://mongo:27017/oms_db?replicaSet=rs0}
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_for_jwt}
    restart: unless-stopped
    networks:
      - oms-network

  mongo:
    image: mongo:6.0
    container_name: nestjs-oms-mongo
    profiles:
      - localdb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - '27018:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - oms-network

  mongo-init:
    image: mongo:6.0
    container_name: nestjs-oms-mongo-init
    profiles:
      - localdb
    depends_on:
      - mongo
    restart: 'no'
    command:
      - /bin/sh
      - -c
      - |
        sleep 5
        mongosh --host mongo:27017 --eval "try { rs.status() } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }"
    networks:
      - oms-network

volumes:
  mongo-data:

networks:
  oms-network:
    driver: bridge
